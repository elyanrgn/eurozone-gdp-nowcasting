name: CI – Test ingestion & scoring pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data (CI mode – no real xlsx needed)
        run: python tools/setup_data.py --ci

      - name: Run ingestion program
        run: |
          python ingestion_program/ingestion.py \
            --data-dir    dev_phase/input_data \
            --output-dir  ingestion_res \
            --submission-dir solution

      - name: Run scoring program
        run: |
          python scoring_program/scoring.py \
            --reference-dir  dev_phase/reference_data \
            --prediction-dir ingestion_res \
            --output-dir     scoring_res

      - name: Print scores
        run: cat scoring_res/scores.json

      - name: Check score is finite
        run: |
          python - <<'EOF'
          import json, math
          with open("scoring_res/scores.json") as f:
              s = json.load(f)
          assert math.isfinite(s["score"]), f"Score is not finite: {s['score']}"
          assert s["score"] < 1000, f"Score too high (pipeline broken?): {s['score']}"
          print(f"CI check passed. RMSE = {s['score']:.4f}")
          EOF
